{% extends "base.html" %}
{% block title %}Gestionar Matrículas - Admin{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">Gestionar Fechas de Matrícula</h1>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Volver al Panel</a>
    </div>

    <!-- Formulario agregar nueva fecha -->
    <div class="card shadow-sm mb-5">
        <div class="card-header"><h5 class="mb-0">Agregar Nueva Fecha</h5></div>
        <div class="card-body">
            <form method="POST" class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label for="level" class="form-label fw-bold">Nivel (ej. Primaria 1ero)</label>
                    <input type="text" name="level" id="level" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label for="start_date" class="form-label fw-bold">Fecha Inicio</label>
                    <input type="date" name="start_date" id="start_date" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label for="end_date" class="form-label fw-bold">Fecha Cierre</label>
                    <input type="date" name="end_date" id="end_date" class="form-control" required>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-success w-100">Agregar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Tabla de fechas existentes -->
    <div class="shadow-sm rounded p-3" style="background: var(--bg-slate); border: 1px solid var(--glass-border);">
        <table class="table align-middle mb-0">
            <thead>
                <tr style="border-bottom: 1px solid var(--glass-border); color: var(--text-muted);">
                    <th>Nivel</th>
                    <th>Inicio</th>
                    <th>Cierre</th>
                    <th class="text-end">Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for d in dates %}
                <tr style="border-bottom: 1px solid var(--glass-border);">
                    <!-- Formulario de edición independiente por fila -->
                    <td colspan="4" class="p-0">
                        <form method="POST" class="d-flex align-items-center gap-2 px-3 py-2">
                            <input type="hidden" name="id" value="{{ d.id }}">
                            <div class="flex-grow-1">
                                <input type="text" name="level" class="form-control form-control-sm" value="{{ d.level }}" required>
                            </div>
                            <div>
                                <input type="date" name="start_date" class="form-control form-control-sm" value="{{ d.start_date }}" required>
                            </div>
                            <div>
                                <input type="date" name="end_date" class="form-control form-control-sm" value="{{ d.end_date }}" required>
                            </div>
                            <div class="d-flex gap-1 flex-shrink-0">
                                <button type="submit" class="btn btn-sm btn-primary">Guardar</button>
                                <a href="{{ url_for('delete_enrollment_date', id=d.id) }}"
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('¿Eliminar esta fecha de matrícula?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </div>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" class="text-center text-muted py-4">No hay fechas programadas.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
