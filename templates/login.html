{% extends "base.html" %}
{% block title %}Iniciar Sesión - Cindea de Venecia{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card login-card shadow border-0">
            <div class="card-body p-5">
                <div class="login-logo-wrap">
                    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="login-logo">
                    <h3 class="login-title">Bienvenido</h3>
                    <p class="login-sub">Ingrese sus credenciales para acceder al sistema</p>
                </div>

                <form method="POST">
                    <div class="mb-4">
                        <label for="username" class="form-label">
                            <i class="bi bi-person me-1 text-primary"></i>Usuario
                        </label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                            <input type="text" class="form-control" id="username" name="username"
                                   placeholder="Tu nombre de usuario" required autocomplete="username">
                        </div>
                    </div>
                    <div class="mb-5">
                        <label for="password" class="form-label">
                            <i class="bi bi-lock me-1 text-primary"></i>Contraseña
                        </label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="••••••••" required autocomplete="current-password">
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold py-3">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
                        </button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <a href="{{ url_for('index') }}" class="text-muted small text-decoration-none">
                        <i class="bi bi-arrow-left me-1"></i>Volver al inicio
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
